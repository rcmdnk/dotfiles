# https://github.com/openai/codex/blob/main/codex-rs/config.md

model = "gpt-5.4"
#model ="gpt-5"
#model_reasoning_effort = "medium"
#model_reasoning_effort = "high"
model_reasoning_effort = "medium"
#plan_mode_reasoning_effort = "xhigh"

personality = "pragmatic"

approval_policy = "on-request"
#approval_policy = "never"

# Need danger-full-access to run git commands automatically (though mcp allow to use git with workspace-write mode)
# https://github.com/openai/codex/issues/5034
sandbox_mode    = "workspace-write"
#sandbox_mode    = "danger-full-access"

network_access = true

# notify = ["bash", "-c", "..."]

rcmp_client = true
web_search_request = true
suppress_unstable_features_warning = true
#service_tier = "fast"

[features]
apps = true
collaboration_modes = true
multi_agent = true
undo = true
voice_transcription = true
fast_mode = true

[shell_environment_policy]
inherit = "all"
#ignore_defualt_excludes = false
#exclude = ["AWS_*", "AZURE_*"]
#set = { CI = "1" }
include_only = ["PATH", "HOME"]

[tui]
status_line = ["model-with-reasoning", "context-remaining", "current-dir", "five-hour-limit", "weekly-limit"]

[agents]
agents.job_max_runtime_seconds = 3600
agents.max_depth = 2
agents.max_threads = 20


[agents.default]

[agents.awaiter]
config_file = "agents/awaiter.toml"
description = "Long-running tasks only (tests, watches, wait-heavy monitoring). Use long waits and close the agent after completion."

[agents.explorer]
config_file = "agents/explorer.toml"
description = "Codebase Q&A and targeted investigation. Optimize for speed and reliability; trust prior exploration results and avoid redundant re-scans."

[agents.worker]
config_file = "agents/worker.toml"
description = "Implementation and fixes. Assign explicit file/ownership scope and deliver concrete code changes."

[agents.quick]
config_file = "agents/quick.toml"
description = "Lightweight/simple tasks only. Prefer fast execution with spark+low reasoning; hand off to worker when scope grows."

[mcp_servers.context7]
command = "context7-mcp"
args = ["--api-key", "${CONTEXT7_API_KEY}"]
startup_timeout_sec = 60

[mcp_servers.terraform]
command = "docker"
args = ["run", "-i", "--rm", "hashicorp/terraform-mcp-server:latest"]
startup_timeout_sec = 60
enabled = false

[mcp_servers.aws-knowledge-mcp-server]
command = "fastmcp"
args = ["run",  "https://knowledge-mcp.global.api.aws"]
startup_timeout_sec = 60
enabled = false

[mcp_servers.aws-diagram-mcp-server]
command = "awslabs.aws-diagram-mcp-server"
args = []
startup_timeout_sec = 60
enabled = false

[mcp_servers.aws-pricing-mcp-server]
command = "awslabs.aws-pricing-mcp-server"
args = []
startup_timeout_sec = 60
enabled = false

[mcp_servers.serena]
command = "serena"
args = ["start-mcp-server", "--context", "codex", "--enable-web-dashboard", "false"]
startup_timeout_sec = 60
enabled = false

[mcp_servers.playwright]
command = "mcp-server-playwright"
args = []
enabled = false

[mcp_servers.chrome-devtools]
command = "chrome-devtools-mcp"
args = []
enabled = false

[mcp_servers.github-mcp-server]
url = "https://api.githubcopilot.com/mcp"
bearer_token_env_var = "GITHUB_MCP_API_TOKEN" # Need to write environmental variable name instead of token value directly
enabled = false

[projects."/mnt/efs/fs1/accelstars/apaf-x"]
trust_level = "trusted"
